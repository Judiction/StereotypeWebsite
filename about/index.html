<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Judd Buchannan</title>
    <meta name="description" content="Judd Buchannan is a 3D Artist and Creative Technologist.">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav id="main-nav"></nav>

    <main id="app">
        <section class="about-page">
            <div class="about-grid">
                <article class="bio">
                    <img src=https://assets.objkt.media/file/assets-004/h/tz1bEybUvLkmSbHcCAqwQPZtf7sqj1JQwSHS/thumb400?cb=e02119e3" alt="Judd Buchannan, 3D Artist, Filmmaker, Creative Technologist">
                    <h2>About</h2>
                    <p>Judd Buchannan is a 3D Artist & Creative Technologist...</p>
                </article>

                <aside class="about-contact">
                    <h3>Contact</h3>
                    <form action="https://formsubmit.co/your-email@gmail.com" method="POST" class="contact-form">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="NAME" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="EMAIL" required>
                        </div>
                        <div class="form-group">
                            <textarea name="message" placeholder="MESSAGE" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">
                            SEND MESSAGE
                            <span class="arrow">→</span>
                        </button>
                    </form>
                </aside>
            </div>
        </section>
    </main>

    <script type="module" src="../js/app.js"></script>
</body>
</html>
